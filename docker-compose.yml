version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: bobby
      POSTGRES_PASSWORD: bobby123
      POSTGRES_DB: talleresboby
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bobby -d talleresboby"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: ./backend/.env
    environment:
      # Override DATABASE_URL to use the docker-compose db container
      DATABASE_URL: postgresql://bobby:bobby123@db/talleresboby
      DEV_MODE: "true"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      # VITE_* vars are baked in at build time — browser calls localhost:8000 directly
      - VITE_API_URL=http://localhost:8000
      - VITE_HCAPTCHA_SITE_KEY=11e40a7a-9998-4c9e-bea0-1a089e9e38d8
    depends_on:
      - backend

volumes:
  pgdata:
